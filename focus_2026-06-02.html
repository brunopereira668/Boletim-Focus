<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boletim Focus</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;--bg:#f9fafb;--surface:#ffffff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--blue:#1a56db;--green:#057a55;--red:#e02424;--orange:#f05a28;--yellow-bg:#fff7ed;--red-bg:#fee2e2;}
[data-theme="dark"]{color-scheme:dark;--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--yellow-bg:#431407;--red-bg:#450a0a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:system-ui,-apple-system,sans-serif;font-size:16px;line-height:1.65;background:var(--bg);color:var(--text);}
#alert-band{height:5px;width:100%;}
#alert-band.band-critico{background:var(--red);}
#alert-band.band-atencao{background:var(--orange);}
#alert-band.band-ok{background:var(--green);}
#progress-bar{position:fixed;top:5px;left:0;height:3px;width:0%;background:var(--blue);z-index:1000;transition:width .1s;}
nav{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:999;}
.nav-inner{max-width:820px;margin:0 auto;padding:.5rem 1rem;display:flex;gap:.25rem;overflow-x:auto;scrollbar-width:none;align-items:center;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-link{text-decoration:none;color:var(--muted);font-size:.8rem;font-weight:500;padding:.25rem .5rem;border-radius:4px;white-space:nowrap;transition:background .15s,color .15s;}
.nav-link:hover,.nav-link.active{color:var(--blue);background:color-mix(in srgb,var(--blue) 10%,transparent);}
#theme-toggle{margin-left:auto;background:none;border:1px solid var(--border);border-radius:20px;padding:.2rem .6rem;cursor:pointer;font-size:.85rem;color:var(--muted);white-space:nowrap;flex-shrink:0;}
#theme-toggle:hover{color:var(--text);}
main{max-width:820px;margin:0 auto;padding:1.5rem 1rem 3rem;}
header{margin-bottom:1.5rem;}
header h1{font-size:1.5rem;font-weight:700;color:var(--blue);}
header p{color:var(--muted);font-size:.875rem;margin-top:.25rem;}
section{margin-bottom:2.5rem;}
h2{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:1rem;padding-bottom:.4rem;border-bottom:2px solid var(--blue);display:flex;align-items:center;gap:.4rem;}
.resumo-text{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:6px;padding:1rem 1.25rem;line-height:1.75;}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-top:1.25rem;}
@media(min-width:500px){.cards-grid{grid-template-columns:repeat(4,1fr);}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.875rem;text-align:center;}
.card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.25rem;}
.card-value{font-size:1.35rem;font-weight:700;}
.card-var{font-size:.75rem;margin-top:.2rem;}
.card-trend{font-size:.7rem;color:var(--muted);margin-top:.15rem;}
.card-sparkline{margin-top:.5rem;display:flex;justify-content:center;opacity:.85;}
.sparkline-path{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.spark-up{stroke:var(--red);} .spark-down{stroke:var(--green);} .spark-stable{stroke:var(--muted);} .spark-up-good{stroke:var(--green);}
.c-up{color:var(--red);} .c-down{color:var(--green);} .c-stable{color:var(--muted);} .c-up-good{color:var(--green);}
.alert-box{border-radius:8px;padding:.875rem 1rem;margin-bottom:.75rem;display:flex;align-items:flex-start;gap:.6rem;}
.alert-critical{background:var(--red-bg);border:1px solid var(--red);}
.alert-attention{background:var(--yellow-bg);border:1px solid var(--orange);}
.alert-icon{font-size:1rem;flex-shrink:0;margin-top:.1rem;}
.alert-text{font-size:.875rem;line-height:1.5;}
.alert-text strong{display:block;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.1rem;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.875rem;}
th{background:var(--surface);border:1px solid var(--border);padding:.6rem .75rem;text-align:left;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;color:var(--text);}
th:hover{background:color-mix(in srgb,var(--blue) 8%,var(--surface));}
th::after{content:" ⇅";font-size:.65rem;color:var(--muted);}
th.asc::after{content:" ↑";color:var(--blue);}
th.desc::after{content:" ↓";color:var(--blue);}
td{border:1px solid var(--border);padding:.6rem .75rem;background:var(--surface);white-space:nowrap;}
td.t-up{color:var(--red);font-weight:600;} td.t-down{color:var(--green);font-weight:600;} td.t-stable{color:var(--muted);}
td.t-up-good{color:var(--green);font-weight:600;} td.t-down-bad{color:var(--red);font-weight:600;}
tr:hover td{background:color-mix(in srgb,var(--blue) 4%,var(--surface));}
.sem{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.sem-ok{background:var(--green);} .sem-atencao{background:var(--orange);} .sem-critico{background:var(--red);} .sem-neutro{background:var(--muted);}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1rem .75rem;margin-top:1rem;}
.chart-wrap canvas{max-height:200px;}
.accordion-item{border:1px solid var(--border);border-radius:6px;margin-bottom:.5rem;overflow:hidden;}
.accordion-btn{width:100%;text-align:left;background:var(--surface);border:none;padding:.75rem 1rem;font-size:.9rem;font-weight:600;cursor:pointer;color:var(--text);display:flex;justify-content:space-between;align-items:center;}
.accordion-btn:hover{background:color-mix(in srgb,var(--blue) 5%,var(--surface));}
.accordion-arrow{transition:transform .25s;color:var(--muted);}
.accordion-item.open .accordion-arrow{transform:rotate(180deg);}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--bg);}
.accordion-item.open .accordion-body{max-height:600px;}
.accordion-content{padding:.75rem 1rem;font-size:.875rem;line-height:1.7;border-top:1px solid var(--border);}
.accordion-content a{color:var(--blue);word-break:break-word;}
.fontes-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.fontes-list li{font-size:.875rem;}
.fontes-list a{color:var(--blue);word-break:break-word;text-decoration:none;}
.fontes-list a:hover{text-decoration:underline;}
.glossario-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.glossario-list li{font-size:.875rem;line-height:1.6;border-bottom:1px solid var(--border);padding-bottom:.4rem;}
.glossario-list li:last-child{border-bottom:none;}
.glossario-list strong{color:var(--blue);}
.obs{font-size:.75rem;color:var(--muted);margin-top:.5rem;}
.no-alerts{color:var(--muted);font-size:.875rem;font-style:italic;}
</style>
</head>
<body>
<div id="alert-band"></div>
<div id="progress-bar"></div>
<nav><div class="nav-inner" id="nav-links"></div></nav>
<main id="main-content"></main>
<script>
/* ================================================================
   DADOS DA SEMANA — o agente substitui apenas este bloco a cada run
   NOVO CAMPO: historico — array com últimas semanas do CSV
   (mais antiga primeiro, mais recente por último). Exemplo:
   historico: [
     { data:"25/05", ipca:5.04, pib:1.89, selic:13.25, cambio:5.17 },
     { data:"02/06", ipca:5.09, pib:1.90, selic:13.25, cambio:5.16 }
   ]
   ================================================================ */
const DADOS = {
  referencia: "2 de junho de 2026",
  gerado: "06/06/2026",
  resumo: "O Boletim Focus de 2 de junho de 2026 registrou a 12ª alta consecutiva na projeção para o IPCA deste ano, que avançou de 5,04% para 5,09%, mantendo-se acima do teto da meta de 4,5% do BCB. A Selic foi mantida em 13,25% pela segunda semana seguida, sinalizando estabilidade no patamar restritivo de juros. O câmbio recuou pela segunda semana consecutiva para R$5,16, enquanto o PIB ganhou mais um décimo, chegando a 1,90%. O destaque negativo fica com o IGP-M, que atingiu 6,00% após 13 altas seguidas, ampliando o risco de repasse aos contratos indexados.",
  cards: [
    { label:"IPCA 2026", valor:"5,09%", var:"▲ +0,05 p.p.", varDir:"up", trend:"↑ 12ª alta consecutiva" },
    { label:"PIB 2026", valor:"1,90%", var:"▲ +0,01 p.p.", varDir:"up_good", trend:"↑ 2ª alta seguida" },
    { label:"Selic 2026", valor:"13,25%", var:"→ Estável", varDir:"stable", trend:"→ 2ª semana estável" },
    { label:"Câmbio 2026", valor:"R$5,16", var:"▼ −0,01", varDir:"down", trend:"↓ 2ª queda seguida" }
  ],
  alertas: [
    { nivel:"atencao", texto:"IPCA de 5,09% supera o teto da meta de 4,5% pelo 12º boletim consecutivo — pressão inflacionária persistente. IGP-M atingiu 6,00% após 13 altas seguidas, elevando o risco de repasse a contratos de aluguel e energia." }
  ],
  tabela: [
    { indicador:"IPCA", atual:"5,09%", prox:"4,02%", var:"▲ +0,05 p.p.", varDir:"up" },
    { indicador:"IGP-M", atual:"6,00%", prox:"4,00%", var:"▲ +0,09 p.p.", varDir:"up" },
    { indicador:"PIB", atual:"1,90%", prox:"1,70%", var:"▲ +0,01 p.p.", varDir:"up_good" },
    { indicador:"Selic", atual:"13,25%", prox:"11,25%", var:"→ Estável", varDir:"stable" },
    { indicador:"Câmbio USD/BRL", atual:"R$5,16", prox:"R$5,25", var:"▼ −0,01", varDir:"down" },
    { indicador:"Conta Corrente (US$ bi)", atual:"−60,50", prox:"", var:"▲ +0,70", varDir:"down" },
    { indicador:"IDP (US$ bi)", atual:"75,00", prox:"", var:"→ Estável", varDir:"stable" },
    { indicador:"Dívida Líquida (% PIB)", atual:"69,90%", prox:"", var:"→ Estável", varDir:"stable" },
    { indicador:"Resultado Primário (% PIB)", atual:"−0,50%", prox:"", var:"→ Estável", varDir:"stable" }
  ],
  obsTabela: "Resultado Nominal não divulgado nesta edição. Projeções para 2027 disponíveis apenas para IPCA, IGP-M, PIB, Selic e Câmbio.",
  analise: [
    {
      titulo: "IPCA 2026: ▲ de 5,04% para 5,09% — 12ª alta seguida",
      corpo: "A projeção para o IPCA de 2026 avançou pelo 12º boletim consecutivo, consolidando-se em 5,09% — acima do teto da meta de 4,5% fixada pelo Banco Central. O movimento reflete a combinação de serviços resilientes, câmbio estruturalmente depreciado e pressão em energia elétrica. Para 2027, a mediana subiu de 4,01% para 4,02%, indicando que o mercado ainda não enxerga ancoragem das expectativas no horizonte de dois anos. O cenário reforça a necessidade de manutenção da política monetária restritiva por período prolongado.",
      fonteTitulo: "InfoMoney — Boletim Focus: 12ª alta seguida no IPCA 2026",
      fonteUrl: "https://www.infomoney.com.br/economia/boletim-focus-projecoes-01062026/"
    },
    {
      titulo: "IGP-M 2026: ▲ de 5,91% para 6,00% — 13ª alta seguida",
      corpo: "O IGP-M chegou a 6,00% para 2026, acumulando 13 semanas consecutivas de alta. Amplamente utilizado como base de reajuste em contratos de aluguel e tarifas de energia, o indicador sinaliza pressão adicional sobre o orçamento das famílias ao longo do ano. A alta reflete principalmente o câmbio depreciado sobre preços no atacado e a escalada de commodities no mercado externo. Se o ritmo for mantido, o IGP-M pode ultrapassar 7% nas próximas semanas, acionando novo nível de atenção.",
      fonteTitulo: "InfoMoney — Boletim Focus: eleva projeção de inflação para 2026 pela 12ª semana seguida",
      fonteUrl: "https://www.infomoney.com.br/economia/boletim-focus-projecoes-01062026/"
    }
  ],
  fontes: [
    { titulo: "InfoMoney — Boletim Focus: eleva projeção de inflação para 2026 pela 12ª semana seguida", url: "https://www.infomoney.com.br/economia/boletim-focus-projecoes-01062026/" },
    { titulo: "CNN Brasil — Focus: Mercado passa a ver Selic a 13,25% em 2026", url: "https://www.cnnbrasil.com.br/economia/macroeconomia/focus-mercado-eleva-projecao-e-passa-a-ver-selic-a-1325-em-2026/" },
    { titulo: "Banco Central do Brasil — Boletim Focus", url: "https://www.bcb.gov.br/publicacoes/focus" }
  ],
  historico: [
    { data:"25/05", ipca:5.04, pib:1.89, selic:13.25, cambio:5.17 },
    { data:"02/06", ipca:5.09, pib:1.90, selic:13.25, cambio:5.16 }
  ],
  glossario: [
    { termo:"IPCA", def:"Inflação oficial do Brasil medida pelo IBGE. Meta do Banco Central: 3%, com teto de 4,5%." },
    { termo:"IGP-M", def:"Inflação medida pela FGV, usada como base de reajuste em contratos de aluguel e energia elétrica." },
    { termo:"PIB", def:"Produto Interno Bruto — mede o crescimento total da economia brasileira em determinado período." },
    { termo:"Taxa Selic", def:"Taxa básica de juros da economia, definida pelo Copom do BCB. Referência para crédito e investimentos." },
    { termo:"Câmbio USD/BRL", def:"Preço do dólar americano em reais ao fim do período projetado." },
    { termo:"Conta Corrente", def:"Saldo das transações do Brasil com o exterior, incluindo comércio de bens, serviços e rendas (US$ bi)." },
    { termo:"IDP", def:"Investimento Direto no País — volume de capital estrangeiro aportado em empresas brasileiras (US$ bi)." },
    { termo:"Dívida Líquida do Setor Público", def:"Dívida bruta do governo menos seus ativos financeiros, em % do PIB." },
    { termo:"Resultado Primário", def:"Diferença entre receitas e despesas do governo antes do pagamento de juros (% PIB). Positivo = superávit." },
    { termo:"Resultado Nominal", def:"Resultado fiscal do governo incluindo o pagamento de juros da dívida pública (% PIB)." }
  ]
}

/* ================================================================
   MOTOR DE RENDERIZAÇÃO — NÃO MODIFICAR
   ================================================================ */
function dirClass(dir){return{up:'c-up',down:'c-down',stable:'c-stable',up_good:'c-up-good',down_bad:'c-down'}[dir]||'c-stable';}
function tdClass(dir){return{up:'t-up',down:'t-down',stable:'t-stable',up_good:'t-up-good',down_bad:'t-down-bad'}[dir]||'t-stable';}

function semaforoClass(indicador,valorStr){
  const v=parseFloat((valorStr||'').replace(',','.').replace('%','').replace('R$','').replace('−','-').replace('–','-'));
  if(isNaN(v))return 'sem-neutro';
  const ind=indicador.toLowerCase();
  if(ind.includes('ipca'))return v>6?'sem-critico':v>4.5?'sem-atencao':'sem-ok';
  if(ind.includes('igp-m'))return v>7?'sem-atencao':'sem-ok';
  if(ind.includes('selic'))return v>14.75?'sem-atencao':'sem-ok';
  if(ind.includes('pib'))return v<1?'sem-atencao':'sem-ok';
  if(ind.includes('câmbio'))return v>6?'sem-critico':'sem-ok';
  if(ind.includes('resultado primário'))return v<-1.5?'sem-critico':v<-1?'sem-atencao':'sem-ok';
  if(ind.includes('dívida líquida'))return v>90?'sem-critico':'sem-ok';
  return 'sem-neutro';
}

function sparklineSVG(values,dir){
  const valid=(values||[]).filter(v=>v!=null&&!isNaN(v));
  if(valid.length<2)return '';
  const w=72,h=22,pad=2;
  const min=Math.min(...valid),max=Math.max(...valid),range=max-min||0.0001;
  const pts=valid.map((v,i)=>{
    const x=pad+(i/(valid.length-1))*(w-pad*2);
    const y=(h-pad)-((v-min)/range)*(h-pad*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const cls={up:'spark-up',down:'spark-down',stable:'spark-stable',up_good:'spark-up-good'}[dir]||'spark-stable';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true"><polyline points="${pts}" class="sparkline-path ${cls}"/></svg>`;
}

let _chart=null;
function mountChart(historico){
  const canvas=document.getElementById('hist-chart');
  if(!canvas||!historico||historico.length<2)return;
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const gc=dark?'rgba(255,255,255,.07)':'rgba(0,0,0,.05)';
  const tc=dark?'#94a3b8':'#6b7280';
  if(_chart){_chart.destroy();_chart=null;}
  _chart=new Chart(canvas,{
    type:'line',
    data:{
      labels:historico.map(h=>h.data),
      datasets:[
        {label:'IPCA (%)',data:historico.map(h=>h.ipca),borderColor:'#e02424',backgroundColor:'rgba(224,36,36,.07)',tension:.35,pointRadius:3,borderWidth:2},
        {label:'Selic (%)',data:historico.map(h=>h.selic),borderColor:'#1a56db',backgroundColor:'rgba(26,86,219,.07)',tension:.35,pointRadius:3,borderWidth:2},
        {label:'Câmbio (R$)',data:historico.map(h=>h.cambio),borderColor:'#f05a28',backgroundColor:'rgba(240,90,40,.07)',tension:.35,pointRadius:3,borderWidth:2,yAxisID:'y2'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:tc,font:{size:11},boxWidth:12,padding:12}},
        tooltip:{backgroundColor:dark?'#1e293b':'#fff',titleColor:tc,bodyColor:tc,borderColor:dark?'#334155':'#e5e7eb',borderWidth:1}
      },
      scales:{
        x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},
        y:{ticks:{color:tc,font:{size:10},callback:v=>v+'%'},grid:{color:gc},title:{display:true,text:'% a.a.',color:tc,font:{size:10}}},
        y2:{position:'right',ticks:{color:tc,font:{size:10},callback:v=>'R$'+v},grid:{display:false},title:{display:true,text:'R$/USD',color:tc,font:{size:10}}}
      }
    }
  });
}

function render(){
  if(!DADOS){document.body.innerHTML='<p style="padding:2rem;color:red">Erro: DADOS não foi substituído no template.</p>';return;}
  document.title='Boletim Focus — '+DADOS.referencia;

  const band=document.getElementById('alert-band');
  const hasCritico=DADOS.alertas.some(a=>a.nivel==='critico');
  const hasAtencao=DADOS.alertas.some(a=>a.nivel==='atencao');
  band.className=hasCritico?'band-critico':hasAtencao?'band-atencao':'band-ok';

  const hist=DADOS.historico||[];
  const sparks=[
    sparklineSVG(hist.map(h=>h.ipca),'up'),
    sparklineSVG(hist.map(h=>h.pib),'up_good'),
    sparklineSVG(hist.map(h=>h.selic),'stable'),
    sparklineSVG(hist.map(h=>h.cambio),'down')
  ];

  document.getElementById('nav-links').innerHTML=
    ['resumo','alertas','indicadores','analise','fontes','glossario']
    .map((s,i)=>`<a href="#${s}" class="nav-link">${['Resumo','Alertas','Indicadores','Análise','Fontes','Glossário'][i]}</a>`)
    .join('')+`<button id="theme-toggle">🌙 Escuro</button>`;

  document.getElementById('main-content').innerHTML=`
    <header>
      <h1>Boletim Focus</h1>
      <p>Referência: <strong>${DADOS.referencia}</strong> · Banco Central do Brasil · Gerado em ${DADOS.gerado}</p>
    </header>
    <section id="resumo">
      <h2>📋 Resumo Executivo</h2>
      <div class="resumo-text">${DADOS.resumo}</div>
      <div class="cards-grid">${DADOS.cards.map((c,i)=>`
        <div class="card">
          <div class="card-label">${c.label}</div>
          <div class="card-value">${c.valor}</div>
          <div class="card-var ${dirClass(c.varDir)}">${c.var}</div>
          <div class="card-trend">${c.trend}</div>
          ${sparks[i]?`<div class="card-sparkline">${sparks[i]}</div>`:''}
        </div>`).join('')}
      </div>
      ${hist.length>=2?`<div class="chart-wrap"><canvas id="hist-chart"></canvas></div>`:''}
    </section>
    <section id="alertas">
      <h2>🚨 Alertas</h2>
      ${DADOS.alertas.length===0
        ?'<p class="no-alerts">Nenhum alerta ativo nesta semana.</p>'
        :[...DADOS.alertas.filter(a=>a.nivel==='critico').map(a=>`
            <div class="alert-box alert-critical"><span class="alert-icon">🔴</span>
              <div class="alert-text"><strong>Nível Crítico</strong>${a.texto}</div></div>`),
           ...DADOS.alertas.filter(a=>a.nivel==='atencao').map(a=>`
            <div class="alert-box alert-attention"><span class="alert-icon">⚠️</span>
              <div class="alert-text"><strong>Nível Atenção</strong>${a.texto}</div></div>`)
          ].join('')}
    </section>
    <section id="indicadores">
      <h2>📊 Tabela de Indicadores</h2>
      <div class="table-wrap"><table id="tabela">
        <thead><tr>
          <th data-col="0">Indicador</th><th data-col="1">Ano Corrente</th>
          <th data-col="2">Próx. Ano</th><th data-col="3">Var. Semana</th>
        </tr></thead>
        <tbody id="tabela-body">
          ${DADOS.tabela.map(r=>`<tr>
            <td><span class="sem ${semaforoClass(r.indicador,r.atual)}"></span>${r.indicador}</td>
            <td>${r.atual}</td><td>${r.prox||''}</td>
            <td class="${tdClass(r.varDir)}">${r.var}</td></tr>`).join('')}
        </tbody>
      </table></div>
      ${DADOS.obsTabela?`<p class="obs">${DADOS.obsTabela}</p>`:''}
    </section>
    <section id="analise">
      <h2>🔍 O que mudou e por quê</h2>
      ${DADOS.analise.map(a=>`
        <div class="accordion-item">
          <button class="accordion-btn">${a.titulo}<span class="accordion-arrow">▾</span></button>
          <div class="accordion-body"><div class="accordion-content">
            ${a.corpo}<br><br>
            <strong>Fonte:</strong> <a href="${a.fonteUrl}" target="_blank" rel="noopener">${a.fonteTitulo}</a>
          </div></div>
        </div>`).join('')}
    </section>
    <section id="fontes">
      <h2>🔗 Fontes</h2>
      <ul class="fontes-list">
        ${DADOS.fontes.map(f=>`<li><a href="${f.url}" target="_blank" rel="noopener">${f.titulo}</a></li>`).join('')}
      </ul>
    </section>
    <section id="glossario">
      <h2>📖 Glossário</h2>
      <ul class="glossario-list">
        ${DADOS.glossario.map(g=>`<li><strong>${g.termo}:</strong> ${g.def}</li>`).join('')}
      </ul>
    </section>`;

  if(hist.length>=2)setTimeout(()=>mountChart(hist),0);

  const bar=document.getElementById('progress-bar');
  document.addEventListener('scroll',()=>{
    const el=document.documentElement;
    bar.style.width=(el.scrollTop/(el.scrollHeight-el.clientHeight)*100)+'%';
  });

  document.getElementById('theme-toggle').addEventListener('click',function(){
    const dark=document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme',dark?'light':'dark');
    this.textContent=dark?'🌙 Escuro':'☀️ Claro';
    if(hist.length>=2)setTimeout(()=>mountChart(hist),0);
  });

  document.querySelectorAll('section[id]').forEach(sec=>
    new IntersectionObserver(entries=>entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
        const a=document.querySelector(`.nav-link[href="#${e.target.id}"]`);
        if(a)a.classList.add('active');
      }
    }),{rootMargin:'-30% 0px -60% 0px'}).observe(sec)
  );

  let sortCol=-1,sortDir=1;
  document.querySelectorAll('#tabela th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
      const col=parseInt(th.dataset.col);
      sortDir=sortCol===col?-sortDir:1;sortCol=col;
      document.querySelectorAll('#tabela th').forEach(h=>h.classList.remove('asc','desc'));
      th.classList.add(sortDir===1?'asc':'desc');
      const tbody=document.getElementById('tabela-body');
      Array.from(tbody.querySelectorAll('tr'))
        .sort((a,b)=>{
          const at=a.querySelectorAll('td')[col]?.textContent.trim()||'';
          const bt=b.querySelectorAll('td')[col]?.textContent.trim()||'';
          return at.localeCompare(bt,'pt',{numeric:true})*sortDir;
        }).forEach(r=>tbody.appendChild(r));
    });
  });

  document.querySelectorAll('.accordion-btn').forEach(btn=>
    btn.addEventListener('click',()=>btn.closest('.accordion-item').classList.toggle('open'))
  );
}
render();
</script>
</body>
</html>
